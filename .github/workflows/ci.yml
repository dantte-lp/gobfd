name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Build
        shell: bash
        run: |
          VERSION="ci-${GITHUB_SHA::8}"
          GIT_COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X github.com/dantte-lp/gobfd/internal/version.Version=${VERSION} \
            -X github.com/dantte-lp/gobfd/internal/version.GitCommit=${GIT_COMMIT} \
            -X github.com/dantte-lp/gobfd/internal/version.BuildDate=${BUILD_DATE}"
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfd
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfdctl
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfd-haproxy-agent
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfd-exabgp-bridge

      - name: Install test tools
        run: |
          pip install --break-system-packages --no-cache-dir --only-binary=:all: junit2html==31.0.5 2>/dev/null || true

      - name: Test with coverage
        run: |
          go tool gotestsum \
            --junitfile unit-report.xml \
            --jsonfile unit-report.json \
            --format short-verbose \
            -- -buildvcs=false ./... -race -count=1 \
               -coverprofile=coverage.out -covermode=atomic

      - name: Generate HTML test report
        if: always()
        run: junit2html unit-report.xml unit-report.html 2>/dev/null || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: |
            unit-report.xml
            unit-report.json
            unit-report.html
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

  lint-go:
    name: Lint (Go)
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: golangci-lint v2
        run: go tool golangci-lint run ./...

  lint-docs:
    name: Lint (docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install documentation linters
        run: |
          npm install -g --ignore-scripts markdownlint-cli2@0.22.1 cspell@10.0.0
          python3 -m pip install --user --break-system-packages --no-cache-dir --only-binary=:all: yamllint==1.38.0

      - name: markdownlint
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#vendor" "#reports" "#dist" "#build" "#docs/rfc"

      - name: yamllint
        run: ~/.local/bin/yamllint -c .yamllint.yaml .

      - name: cspell
        run: >
          cspell --no-progress --no-summary --config .cspell.json
          README.md CONTRIBUTING.md CHANGELOG.md
          CODE_OF_CONDUCT.md SUPPORT.md GOVERNANCE.md MAINTAINERS.md
          docs/en/implementation-plan.md docs/en/codebase-consistency-audit.md

  commitlint:
    name: Commitlint (PR title)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install commitlint
        run: npm install -g --ignore-scripts @commitlint/cli@20.5.3 @commitlint/config-conventional@20.5.3

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PR_TITLE" | commitlint --config .commitlintrc.yaml

  vulnerability-check:
    name: Vulnerability audit
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Vulnerability Audit
        run: go run ./scripts/vuln-audit.go

  buf:
    name: Buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          setup_only: true

      - name: buf lint
        run: buf lint

      - name: Fetch base branch for buf breaking
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: buf breaking
        if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=origin/${{ github.event.pull_request.base.ref }}'

  benchmark:
    name: Benchmark comparison
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Run benchmarks (PR)
        run: go test -buildvcs=false -bench=. -benchmem -count=6 -run='^$' ./... > new.txt

      - name: Trust workspace for benchmark git checkout
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout base branch
        run: git checkout origin/${{ github.event.pull_request.base.ref }} -- .

      - name: Run benchmarks (base)
        run: go test -buildvcs=false -bench=. -benchmem -count=6 -run='^$' ./... > old.txt || true

      - name: Restore PR code
        run: git checkout ${{ github.sha }} -- .

      - name: Compare benchmarks
        run: |
          echo "## Benchmark comparison" > bench-report.md
          echo '```' >> bench-report.md
          go tool benchstat old.txt new.txt >> bench-report.md 2>&1 || true
          echo '```' >> bench-report.md
          cat bench-report.md

      - name: Generate HTML comparison
        run: |
          {
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Benchmark Comparison</title>'
            echo '<style>body{font-family:system-ui;margin:2em;background:#1a1a2e;color:#e0e0e0}'
            echo 'pre{background:#16213e;padding:1.5em;border-radius:8px;font-size:14px;line-height:1.6;border:1px solid #0f3460}</style>'
            echo '</head><body><h1 style="color:#00d4ff">Benchmark Comparison</h1><pre>'
            go tool benchstat old.txt new.txt 2>/dev/null || echo "benchstat comparison failed"
            echo '</pre></body></html>'
          } > bench-comparison.html

      - name: Check for regressions (>10%)
        run: |
          go tool benchstat -format csv old.txt new.txt > bench-csv.txt 2>/dev/null || true
          if grep -qE '\+[1-9][0-9]\.' bench-csv.txt 2>/dev/null; then
            echo "::warning::Benchmark regression detected (>10%). Review bench-report.md."
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-reports
          path: |
            old.txt
            new.txt
            bench-report.md
            bench-comparison.html
          retention-days: 30

      - name: Post benchmark comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- benchmark-report -->';
            const body = marker + '\n' + fs.readFileSync('bench-report.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    needs: [build-and-test, lint-go, lint-docs, vulnerability-check, buf]
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
