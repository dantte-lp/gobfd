sonar.projectKey=dantte-lp_gobfd
sonar.organization=dantte-lp

# Go coverage report
sonar.go.coverage.reportPaths=coverage.out

# Exclude command entry points and host-network integration boundaries from
# unit coverage. These files are validated by build, lint, security, and
# system/container checks.
sonar.coverage.exclusions=\
  cmd/**,\
  internal/netio/ifmon_linux.go,\
  internal/netio/ifmon_other.go,\
  internal/netio/lag_backend.go,\
  internal/netio/lag_networkmanager.go,\
  internal/netio/lag_ovsdb.go

# Exclude from analysis (generated, tests, infra, docs)
sonar.exclusions=\
  pkg/bfdpb/**,\
  **/*_test.go,\
  test/**,\
  deployments/**,\
  docs/**,\
  bench/**,\
  scripts/**
