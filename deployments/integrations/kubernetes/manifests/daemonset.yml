apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gobfd
  namespace: gobfd
  labels:
    app.kubernetes.io/name: gobfd
    app.kubernetes.io/component: bfd-daemon
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gobfd
      app.kubernetes.io/component: bfd-daemon
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gobfd
        app.kubernetes.io/component: bfd-daemon
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/os: linux
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gobfd
          image: gobfd:local
          imagePullPolicy: Never
          args: ["-config", "/etc/gobfd/gobfd.yml"]
          ports:
            - name: bfd
              containerPort: 3784
              protocol: UDP
            - name: bfd-multihop
              containerPort: 4784
              protocol: UDP
            - name: grpc
              containerPort: 50052
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: grpc
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: ["NET_RAW", "NET_ADMIN"]
          volumeMounts:
            - name: config
              mountPath: /etc/gobfd
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi

        - name: gobgp
          image: docker.io/jauderho/gobgp:v3.33.0
          args: ["-f", "/etc/gobgp/gobgp.toml", "-l", "info"]
          ports:
            - name: bgp
              containerPort: 179
              protocol: TCP
            - name: gobgp-grpc
              containerPort: 50051
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: gobgp-grpc
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: gobgp-grpc
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: gobgp-config
              mountPath: /etc/gobgp
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi

      volumes:
        - name: config
          configMap:
            name: gobfd-config
        - name: gobgp-config
          configMap:
            name: gobgp-config
