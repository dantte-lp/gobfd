# Checked-in full-profile GoBGP example for vendor BFD interop tests.
# The runtime runner writes deployed-vendor-only configs under gobfd/.runtime/.

[global.config]
as = 65001
router-id = "10.0.0.1"
port = 179

[global.apply-policy.config]
default-import-policy = "accept-route"
default-export-policy = "accept-route"

# --- arista (ASN 65002, IPv4) ---

[[neighbors]]
[neighbors.config]
neighbor-address = "10.0.1.2"
peer-as = 65002

[neighbors.transport.config]
local-address = "10.0.1.1"

[[neighbors.afi-safis]]
[neighbors.afi-safis.config]
afi-safi-name = "ipv4-unicast"

# --- arista (ASN 65002, IPv6) ---

[[neighbors]]
[neighbors.config]
neighbor-address = "fd00:0:1::1"
peer-as = 65002

[neighbors.transport.config]
local-address = "fd00:0:1::"

[[neighbors.afi-safis]]
[neighbors.afi-safis.config]
afi-safi-name = "ipv6-unicast"

