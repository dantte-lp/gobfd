apiVersion: v1
kind: Service
metadata:
  name: gobfd
  namespace: gobfd
  labels:
    app.kubernetes.io/name: gobfd
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: gobfd
    app.kubernetes.io/component: bfd-daemon
  ports:
    - name: bfd
      port: 3784
      targetPort: bfd
      protocol: UDP
    - name: bfd-multihop
      port: 4784
      targetPort: bfd-multihop
      protocol: UDP
    - name: grpc
      port: 50052
      targetPort: grpc
      protocol: TCP
    - name: metrics
      port: 9100
      targetPort: metrics
      protocol: TCP
