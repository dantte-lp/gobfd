name: Build

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"

      - name: Run tests with coverage
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Check Sonar token
        id: sonar-token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          if [ -n "${SONAR_TOKEN:-}" ]; then
            echo "mode=run" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${GITHUB_ACTOR}" = "dependabot[bot]" ]; then
            echo "mode=skip-dependabot" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "SONAR_TOKEN is required for non-Dependabot SonarQube scans" >&2
          exit 1

      - name: SonarQube Scan
        if: steps.sonar-token.outputs.mode == 'run'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube skipped for Dependabot
        if: steps.sonar-token.outputs.mode == 'skip-dependabot'
        run: >
          echo "Skipping SonarQube scan because this run was triggered by Dependabot
          and no Dependabot SONAR_TOKEN secret is available."
