syntax = "proto3";

package bfd.v1;

import "buf/validate/validate.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dantte-lp/gobfd/pkg/bfdpb/v1;bfdpb";

// SessionState represents the BFD session state (RFC 5880 Section 4.1, Section 6.2).
enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_ADMIN_DOWN = 1;
  SESSION_STATE_DOWN = 2;
  SESSION_STATE_INIT = 3;
  SESSION_STATE_UP = 4;
}

// DiagnosticCode represents the BFD diagnostic code (RFC 5880 Section 4.1).
enum DiagnosticCode {
  DIAGNOSTIC_CODE_UNSPECIFIED = 0;
  DIAGNOSTIC_CODE_NONE = 1;
  DIAGNOSTIC_CODE_CONTROL_TIME_EXPIRED = 2;
  DIAGNOSTIC_CODE_ECHO_FAILED = 3;
  DIAGNOSTIC_CODE_NEIGHBOR_DOWN = 4;
  DIAGNOSTIC_CODE_FORWARDING_RESET = 5;
  DIAGNOSTIC_CODE_PATH_DOWN = 6;
  DIAGNOSTIC_CODE_CONCAT_PATH_DOWN = 7;
  DIAGNOSTIC_CODE_ADMIN_DOWN = 8;
  DIAGNOSTIC_CODE_REVERSE_CONCAT_PATH_DOWN = 9;
}

// AuthenticationType identifies the BFD authentication mechanism (RFC 5880 Section 4.1).
enum AuthenticationType {
  AUTHENTICATION_TYPE_UNSPECIFIED = 0;
  AUTHENTICATION_TYPE_NONE = 1;
  AUTHENTICATION_TYPE_SIMPLE_PASSWORD = 2;
  AUTHENTICATION_TYPE_KEYED_MD5 = 3;
  AUTHENTICATION_TYPE_METICULOUS_KEYED_MD5 = 4;
  AUTHENTICATION_TYPE_KEYED_SHA1 = 5;
  AUTHENTICATION_TYPE_METICULOUS_KEYED_SHA1 = 6;
}

// SessionType identifies the BFD session family.
enum SessionType {
  SESSION_TYPE_UNSPECIFIED = 0;
  // Single-hop: RFC 5881, port 3784, TTL=255 both ways.
  SESSION_TYPE_SINGLE_HOP = 1;
  // Multi-hop: RFC 5883, port 4784, TX TTL=255, RX TTL>=254.
  SESSION_TYPE_MULTI_HOP = 2;
  // Echo: RFC 9747 unaffiliated BFD echo sessions.
  SESSION_TYPE_ECHO = 3;
  // Micro-BFD: RFC 7130 per-member LAG sessions, UDP port 6784.
  SESSION_TYPE_MICRO_BFD = 4;
  // VXLAN: RFC 8971 BFD over VXLAN Management VNI.
  SESSION_TYPE_VXLAN = 5;
  // Geneve: RFC 9521 BFD over Geneve tunnels.
  SESSION_TYPE_GENEVE = 6;
}

// BfdSession represents the full state of a BFD session.
message BfdSession {
  string peer_address = 1 [(buf.validate.field).string.ip = true];
  string local_address = 2 [(buf.validate.field).string.ip = true];
  string interface_name = 3;
  SessionType type = 4;
  SessionState local_state = 5;
  SessionState remote_state = 6;
  DiagnosticCode local_diagnostic = 7;
  uint32 local_discriminator = 8;
  uint32 remote_discriminator = 9;
  google.protobuf.Duration desired_min_tx_interval = 10;
  google.protobuf.Duration required_min_rx_interval = 11;
  google.protobuf.Duration remote_min_rx_interval = 12;
  uint32 detect_multiplier = 13 [(buf.validate.field).uint32 = {gte: 1}];
  google.protobuf.Duration negotiated_tx_interval = 14;
  google.protobuf.Duration detection_time = 15;
  AuthenticationType auth_type = 16;
  google.protobuf.Timestamp last_state_change = 17;
  google.protobuf.Timestamp last_packet_received = 18;
  SessionCounters counters = 19;
}

// SessionCounters contains packet and state transition counters for a session.
message SessionCounters {
  uint64 packets_sent = 1;
  uint64 packets_received = 2;
  uint64 packets_dropped = 3;
  uint64 state_transitions = 4;
  uint64 auth_failures = 5;
}

// AddSessionRequest creates a new BFD session.
message AddSessionRequest {
  string peer_address = 1 [(buf.validate.field).string.ip = true];
  string local_address = 2 [(buf.validate.field).string.ip = true];
  string interface_name = 3;
  SessionType type = 4;
  google.protobuf.Duration desired_min_tx_interval = 5;
  google.protobuf.Duration required_min_rx_interval = 6;
  uint32 detect_multiplier = 7 [(buf.validate.field).uint32 = {gte: 1}];
  AuthenticationType auth_type = 8;
  uint32 auth_key_id = 9 [(buf.validate.field).uint32 = {lte: 255}];
  bytes auth_secret = 10;
}

// AddSessionResponse returns the newly created session.
message AddSessionResponse {
  BfdSession session = 1;
}

// DeleteSessionRequest removes a BFD session by its local discriminator.
message DeleteSessionRequest {
  uint32 local_discriminator = 1;
}

// DeleteSessionResponse is empty on success.
message DeleteSessionResponse {}

// ListSessionsRequest retrieves all active BFD sessions.
message ListSessionsRequest {}

// ListSessionsResponse contains all active BFD sessions.
message ListSessionsResponse {
  repeated BfdSession sessions = 1;
}

// GetSessionRequest retrieves a single BFD session by discriminator or peer address.
message GetSessionRequest {
  oneof identifier {
    uint32 local_discriminator = 1;
    string peer_address = 2;
  }
}

// GetSessionResponse returns the requested BFD session.
message GetSessionResponse {
  BfdSession session = 1;
}

// WatchSessionEventsRequest starts a server-side stream of BFD session events.
message WatchSessionEventsRequest {
  // If true, send current state of all sessions first, then stream changes.
  // Pattern from GoBGP: gobgp monitor --current.
  bool include_current = 1;
}

// WatchSessionEventsResponse represents a BFD session lifecycle event
// streamed from WatchSessionEvents RPC.
message WatchSessionEventsResponse {
  // EventType classifies the session event.
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_STATE_CHANGE = 1;
    EVENT_TYPE_SESSION_ADDED = 2;
    EVENT_TYPE_SESSION_DELETED = 3;
  }
  EventType type = 1;
  BfdSession session = 2;
  SessionState previous_state = 3;
  google.protobuf.Timestamp timestamp = 4;
}

// BfdService provides gRPC API for managing BFD sessions.
//
// Architecture follows the GoBGP pattern: daemon exposes gRPC API,
// CLI (gobfdctl) is a thin client. All operations available via API.
//
// AddSession accepts SESSION_TYPE_SINGLE_HOP (RFC 5881) and
// SESSION_TYPE_MULTI_HOP (RFC 5883). For RFC 9747 Echo see EchoService.
// For RFC 7130 Micro-BFD see MicroBFDService.
service BfdService {
  // AddSession creates a new BFD session with the given parameters.
  rpc AddSession(AddSessionRequest) returns (AddSessionResponse);
  // DeleteSession removes a BFD session by its local discriminator.
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
  // ListSessions returns all active BFD sessions.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  // GetSession returns a single session by discriminator or peer address.
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  // WatchSessionEvents streams BFD session state changes (server-side streaming).
  rpc WatchSessionEvents(WatchSessionEventsRequest) returns (stream WatchSessionEventsResponse);
}

// -----------------------------------------------------------------------
// Echo Service — RFC 9747 unaffiliated BFD echo
// -----------------------------------------------------------------------

// EchoSession represents a single RFC 9747 unaffiliated echo session.
message EchoSession {
  // PeerAddress is the remote system's IP address (echo target).
  string peer_address = 1 [(buf.validate.field).string.ip = true];
  // LocalAddress is the local system's IP address.
  string local_address = 2 [(buf.validate.field).string.ip = true];
  // InterfaceName is the optional outbound interface (SO_BINDTODEVICE).
  string interface_name = 3;
  // TxInterval is the echo transmit interval. RFC 9747 Section 3.3:
  // locally provisioned, not negotiated with the peer.
  google.protobuf.Duration tx_interval = 4;
  // DetectMultiplier sets DetectionTime = DetectMult * TxInterval.
  uint32 detect_multiplier = 5 [(buf.validate.field).uint32 = {gte: 1, lte: 255}];
  // LocalDiscriminator is the discriminator allocated for this session.
  uint32 local_discriminator = 6;
  // LocalState is the current FSM state.
  SessionState local_state = 7;
  // LocalDiagnostic is the latest diagnostic code (RFC 5880 Section 4.1).
  DiagnosticCode local_diagnostic = 8;
  // PacketsSent is the total echo packets transmitted.
  uint64 packets_sent = 9;
  // PacketsReceived is the total echo packets received back.
  uint64 packets_received = 10;
  // LastStateChange is the timestamp of the most recent FSM transition.
  google.protobuf.Timestamp last_state_change = 11;
}

// AddEchoSessionRequest creates a new RFC 9747 echo session.
message AddEchoSessionRequest {
  string peer_address = 1 [(buf.validate.field).string.ip = true];
  string local_address = 2 [(buf.validate.field).string.ip = true];
  string interface_name = 3;
  google.protobuf.Duration tx_interval = 4;
  uint32 detect_multiplier = 5 [(buf.validate.field).uint32 = {gte: 1, lte: 255}];
}

// AddEchoSessionResponse returns the newly created echo session.
message AddEchoSessionResponse {
  EchoSession session = 1;
}

// DeleteEchoSessionRequest removes an echo session by its local discriminator.
message DeleteEchoSessionRequest {
  uint32 local_discriminator = 1;
}

// DeleteEchoSessionResponse is empty on success.
message DeleteEchoSessionResponse {}

// ListEchoSessionsRequest retrieves all active echo sessions.
message ListEchoSessionsRequest {}

// ListEchoSessionsResponse contains all active echo sessions.
message ListEchoSessionsResponse {
  repeated EchoSession sessions = 1;
}

// EchoService provides typed CRUD for RFC 9747 echo sessions.
//
// Echo sessions are not part of BfdService.AddSession because they have
// distinct timer semantics: TxInterval is locally provisioned and there
// is no required_min_rx_interval to negotiate (RFC 9747 Section 3.3).
service EchoService {
  rpc AddEchoSession(AddEchoSessionRequest) returns (AddEchoSessionResponse);
  rpc DeleteEchoSession(DeleteEchoSessionRequest) returns (DeleteEchoSessionResponse);
  rpc ListEchoSessions(ListEchoSessionsRequest) returns (ListEchoSessionsResponse);
}

// -----------------------------------------------------------------------
// Micro-BFD Service — RFC 7130 LAG member-link sessions
// -----------------------------------------------------------------------

// MicroBFDGroup represents an RFC 7130 micro-BFD group bound to a LAG.
message MicroBFDGroup {
  // LagInterface is the logical LAG interface name (e.g., "bond0").
  string lag_interface = 1;
  // MemberLinks lists the physical member link names participating in
  // the LAG. RFC 7130 Section 2: one micro-BFD session per member link.
  repeated string member_links = 2;
  // PeerAddress is the remote system's IP address for every member session.
  string peer_address = 3 [(buf.validate.field).string.ip = true];
  // LocalAddress is the local system's IP address.
  string local_address = 4 [(buf.validate.field).string.ip = true];
  // DesiredMinTxInterval is the BFD timer for member sessions. RFC 7130
  // Section 2.2: timer values MAY differ per member but are expected to
  // be the same within a group.
  google.protobuf.Duration desired_min_tx_interval = 5;
  // RequiredMinRxInterval is the minimum acceptable RX interval.
  google.protobuf.Duration required_min_rx_interval = 6;
  // DetectMultiplier is the detection time multiplier.
  uint32 detect_multiplier = 7 [(buf.validate.field).uint32 = {gte: 1, lte: 255}];
  // MinActiveLinks is the minimum number of member links that must be Up
  // for the LAG to be considered operational. Must satisfy
  // 1 <= MinActiveLinks <= len(MemberLinks).
  uint32 min_active_links = 8 [(buf.validate.field).uint32.gte = 1];
  // AggregateUp reflects whether the group's aggregate state is Up.
  bool aggregate_up = 9;
  // UpMemberCount is the current count of member sessions in state Up.
  uint32 up_member_count = 10;
}

// AddMicroBFDGroupRequest creates a new RFC 7130 micro-BFD group.
message AddMicroBFDGroupRequest {
  string lag_interface = 1;
  repeated string member_links = 2;
  string peer_address = 3 [(buf.validate.field).string.ip = true];
  string local_address = 4 [(buf.validate.field).string.ip = true];
  google.protobuf.Duration desired_min_tx_interval = 5;
  google.protobuf.Duration required_min_rx_interval = 6;
  uint32 detect_multiplier = 7 [(buf.validate.field).uint32 = {gte: 1, lte: 255}];
  uint32 min_active_links = 8 [(buf.validate.field).uint32.gte = 1];
}

// AddMicroBFDGroupResponse returns the newly created group.
message AddMicroBFDGroupResponse {
  MicroBFDGroup group = 1;
}

// DeleteMicroBFDGroupRequest removes a micro-BFD group by LAG interface.
message DeleteMicroBFDGroupRequest {
  string lag_interface = 1;
}

// DeleteMicroBFDGroupResponse is empty on success.
message DeleteMicroBFDGroupResponse {}

// ListMicroBFDGroupsRequest retrieves all active micro-BFD groups.
message ListMicroBFDGroupsRequest {}

// ListMicroBFDGroupsResponse contains all active micro-BFD groups.
message ListMicroBFDGroupsResponse {
  repeated MicroBFDGroup groups = 1;
}

// MicroBFDService provides typed CRUD for RFC 7130 micro-BFD groups.
//
// Micro-BFD is not part of BfdService.AddSession because the resource
// being managed is a group of per-member sessions plus aggregate state,
// not a single BFD session.
service MicroBFDService {
  rpc AddMicroBFDGroup(AddMicroBFDGroupRequest) returns (AddMicroBFDGroupResponse);
  rpc DeleteMicroBFDGroup(DeleteMicroBFDGroupRequest) returns (DeleteMicroBFDGroupResponse);
  rpc ListMicroBFDGroups(ListMicroBFDGroupsRequest) returns (ListMicroBFDGroupsResponse);
}
