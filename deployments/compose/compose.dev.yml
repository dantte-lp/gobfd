services:
  dev:
    build:
      context: ../..
      dockerfile: deployments/docker/Containerfile.dev
    volumes:
      - ../..:/app:z
      - ${PODMAN_SOCKET_PATH:-/run/podman/podman.sock}:/run/podman/podman.sock:z
    working_dir: /app
    command: sleep infinity
    # BFD requires raw sockets for UDP with IP headers
    cap_add:
      - NET_RAW
      - NET_ADMIN
    cap_drop:
      - ALL
    # The dev container runs interop tests that inspect sibling containers via
    # the host Podman API socket. Disable container SELinux labeling for this
    # container only; keep capabilities minimal instead of using privileged.
    security_opt:
      - label=disable
    network_mode: host
    environment:
      GOFLAGS: "-buildvcs=false"
      GOCACHE: /tmp/go-cache
      GOMODCACHE: /go/pkg/mod
      CONTAINER_HOST: "unix:///run/podman/podman.sock"
      PODMAN_HOST: "unix:///run/podman/podman.sock"
