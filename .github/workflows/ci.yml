name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Build
        shell: bash
        run: |
          VERSION="ci-${GITHUB_SHA::8}"
          GIT_COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X github.com/dantte-lp/gobfd/internal/version.Version=${VERSION} \
            -X github.com/dantte-lp/gobfd/internal/version.GitCommit=${GIT_COMMIT} \
            -X github.com/dantte-lp/gobfd/internal/version.BuildDate=${BUILD_DATE}"
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfd
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfdctl
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfd-haproxy-agent
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfd-exabgp-bridge

      - name: Install test tools
        run: |
          go install gotest.tools/gotestsum@latest
          pip install --break-system-packages --no-cache-dir junit2html 2>/dev/null || true

      - name: Test with coverage
        run: |
          gotestsum \
            --junitfile unit-report.xml \
            --jsonfile unit-report.json \
            --format short-verbose \
            -- -buildvcs=false ./... -race -count=1 \
               -coverprofile=coverage.out -covermode=atomic

      - name: Generate HTML test report
        if: always()
        run: junit2html unit-report.xml unit-report.html 2>/dev/null || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: |
            unit-report.xml
            unit-report.json
            unit-report.html
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          golangci-lint run ./...

  vulnerability-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Vulnerability Audit
        run: go run ./scripts/vuln-audit.go

  buf:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up buf
        uses: bufbuild/buf-action@8f4a1456a0ab6a1eb80ba68e53832e6fcfacc16c # v1
        with:
          setup_only: true

      - name: buf lint
        run: buf lint

      - name: Fetch base branch for buf breaking
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: buf breaking
        if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=origin/${{ github.event.pull_request.base.ref }}'

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks (PR)
        run: go test -buildvcs=false -bench=. -benchmem -count=6 -run='^$' ./... > new.txt

      - name: Trust workspace for benchmark git checkout
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout base branch
        run: git checkout origin/${{ github.event.pull_request.base.ref }} -- .

      - name: Run benchmarks (base)
        run: go test -buildvcs=false -bench=. -benchmem -count=6 -run='^$' ./... > old.txt || true

      - name: Restore PR code
        run: git checkout ${{ github.sha }} -- .

      - name: Compare benchmarks
        run: |
          echo "## Benchmark comparison" > bench-report.md
          echo '```' >> bench-report.md
          benchstat old.txt new.txt >> bench-report.md 2>&1 || true
          echo '```' >> bench-report.md
          cat bench-report.md

      - name: Generate HTML comparison
        run: |
          {
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Benchmark Comparison</title>'
            echo '<style>body{font-family:system-ui;margin:2em;background:#1a1a2e;color:#e0e0e0}'
            echo 'pre{background:#16213e;padding:1.5em;border-radius:8px;font-size:14px;line-height:1.6;border:1px solid #0f3460}</style>'
            echo '</head><body><h1 style="color:#00d4ff">Benchmark Comparison</h1><pre>'
            benchstat old.txt new.txt 2>/dev/null || echo "benchstat comparison failed"
            echo '</pre></body></html>'
          } > bench-comparison.html

      - name: Check for regressions (>10%)
        run: |
          benchstat -format csv old.txt new.txt > bench-csv.txt 2>/dev/null || true
          if grep -qE '\+[1-9][0-9]\.' bench-csv.txt 2>/dev/null; then
            echo "::warning::Benchmark regression detected (>10%). Review bench-report.md."
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-reports
          path: |
            old.txt
            new.txt
            bench-report.md
            bench-comparison.html
          retention-days: 30

      - name: Post benchmark comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- benchmark-report -->';
            const body = marker + '\n' + fs.readFileSync('bench-report.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  trivy:
    runs-on: ubuntu-latest
    needs: [build-and-test, lint, vulnerability-check, buf]
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
