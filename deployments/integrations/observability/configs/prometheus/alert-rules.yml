groups:
  - name: gobfd
    rules:
      - alert: BFDNoActiveSessions
        expr: sum(gobfd_bfd_sessions) == 0
        for: 10s
        labels:
          severity: warning
        annotations:
          summary: "No active BFD sessions"
          description: "GoBFD has no configured active sessions. Check daemon configuration or dynamic session provisioning."

      - alert: BFDSessionDownTransition
        expr: increase(gobfd_bfd_state_transitions_total{from_state="Up",to_state="Down"}[1m]) > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "BFD session transitioned Down"
          description: "BFD session {{ $labels.local_addr }} -> {{ $labels.peer_addr }} transitioned from Up to Down."

      - alert: BFDSessionFlapping
        expr: sum by (peer_addr, local_addr) (increase(gobfd_bfd_state_transitions_total[5m])) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "BFD session flapping detected"
          description: "BFD session {{ $labels.local_addr }} -> {{ $labels.peer_addr }} had more than 3 state transitions over 5 minutes."

      - alert: BFDAuthFailures
        expr: rate(gobfd_bfd_auth_failures_total[5m]) > 0
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "BFD authentication failures detected"
          description: "Authentication failures on peer {{ $labels.peer_addr }}. Check shared secret configuration."

      - alert: BFDPacketDrops
        expr: rate(gobfd_bfd_packets_dropped_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "BFD packet drops detected"
          description: "Packets dropped for peer {{ $labels.peer_addr }}. Possible network congestion or misconfiguration."
