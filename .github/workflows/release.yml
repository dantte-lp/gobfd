name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Build
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          GIT_COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X github.com/dantte-lp/gobfd/internal/version.Version=${VERSION} \
            -X github.com/dantte-lp/gobfd/internal/version.GitCommit=${GIT_COMMIT} \
            -X github.com/dantte-lp/gobfd/internal/version.BuildDate=${BUILD_DATE}"
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfd
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfdctl
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfd-haproxy-agent
          go build -buildvcs=false -ldflags="${LDFLAGS}" ./cmd/gobfd-exabgp-bridge

      - name: Test
        run: go test -buildvcs=false ./... -race -count=1

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          golangci-lint run ./...

      - name: Vulnerability Audit
        run: go run ./scripts/vuln-audit.go

  reports:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Install report tools
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          go install gotest.tools/gotestsum@latest
          apt-get update && apt-get install -y --no-install-recommends python3-pip
          pip install --break-system-packages --no-cache-dir junit2html

      - name: Run tests with JUnit output
        run: |
          mkdir -p reports/tests
          gotestsum \
            --junitfile reports/tests/unit-report.xml \
            --jsonfile reports/tests/unit-report.json \
            --format short-verbose \
            -- -buildvcs=false ./... -race -count=1
          junit2html reports/tests/unit-report.xml reports/tests/unit-report.html

      - name: Run benchmarks
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p reports/benchmarks testdata/benchmarks/${VERSION}
          go test -buildvcs=false -bench=. -benchmem -count=6 -run='^$' -timeout=120s \
            ./internal/bfd/ | tee testdata/benchmarks/${VERSION}/benchmark-bfd.txt
          go test -buildvcs=false -bench=. -benchmem -count=6 -run='^$' -timeout=120s \
            ./internal/netio/ | tee testdata/benchmarks/${VERSION}/benchmark-netio.txt
          cat testdata/benchmarks/${VERSION}/benchmark-bfd.txt \
              testdata/benchmarks/${VERSION}/benchmark-netio.txt \
              > testdata/benchmarks/${VERSION}/benchmark.txt

      - name: Generate benchmark metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          printf '{"version":"%s","commit":"%s","date":"%s","go":"%s","count":6}\n' \
            "${VERSION}" "${GITHUB_SHA::8}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "$(go env GOVERSION)" \
            > testdata/benchmarks/${VERSION}/meta.json

      - name: Compare with baseline
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ -f testdata/benchmarks/baseline.txt ]; then
            benchstat testdata/benchmarks/baseline.txt \
              testdata/benchmarks/${VERSION}/benchmark.txt \
              | tee reports/benchmarks/comparison-vs-baseline.txt
            {
              echo '<!DOCTYPE html><html><head><meta charset="utf-8">'
              echo '<title>GoBFD Benchmark Comparison: baseline vs '"${VERSION}"'</title>'
              echo '<style>body{font-family:system-ui;margin:2em;background:#1a1a2e;color:#e0e0e0}'
              echo 'h1{color:#00d4ff}pre{background:#16213e;padding:1.5em;border-radius:8px;'
              echo 'font-size:14px;line-height:1.6;border:1px solid #0f3460}'
              echo '.meta{color:#888;font-size:13px}</style></head><body>'
              echo '<h1>GoBFD Benchmark Comparison</h1>'
              echo '<p class="meta">baseline vs '"${VERSION}"' &mdash; '"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'</p><pre>'
              cat reports/benchmarks/comparison-vs-baseline.txt
              echo '</pre></body></html>'
            } > reports/benchmarks/comparison-vs-baseline.html
          fi

      - name: Create reports archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cp testdata/benchmarks/${VERSION}/*.txt reports/benchmarks/ 2>/dev/null || true
          cp testdata/benchmarks/${VERSION}/meta.json reports/benchmarks/ 2>/dev/null || true
          tar -czf gobfd-${VERSION}-reports.tar.gz reports/

      - name: Upload reports archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-reports
          path: gobfd-*-reports.tar.gz
          retention-days: 90

  release:
    runs-on: ubuntu-latest
    needs: [test, reports]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: "1.26.2"

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the section between two version headers.
          # From "## [X.Y.Z]" until next "## [" or end of file.
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") found=1
              next
            }
            /^\[.+\]:/ && found { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          # Fallback if no section found for this version.
          if [ ! -s release-notes.md ]; then
            echo "No release notes found for version $VERSION in CHANGELOG.md."
            echo "Using fallback."
            {
              echo "## What's Changed"
              echo ""
              echo "See [CHANGELOG.md](https://github.com/dantte-lp/gobfd/blob/master/CHANGELOG.md) for details."
            } > release-notes.md
          fi

          echo "--- Release notes for $VERSION ---"
          cat release-notes.md

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.43.0

      - name: Add Syft to PATH
        run: |
          mkdir -p "$RUNNER_TEMP/syft-bin"
          ln -sf "${{ steps.syft.outputs.cmd }}" "$RUNNER_TEMP/syft-bin/syft"
          echo "$RUNNER_TEMP/syft-bin" >> "$GITHUB_PATH"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download reports archive
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-reports

      - name: Attach reports to release
        run: gh release upload "$GITHUB_REF_NAME" gobfd-*-reports.tar.gz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release notes
        run: gh release edit "$GITHUB_REF_NAME" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
